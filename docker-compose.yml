services:
  postgres:
    # PostgreSQL 18.4 — latest stable (verified 2026-05-17, source: endoflife.date/postgresql)
    image: postgres:18.4-alpine
    container_name: patrimo-postgres
    environment:
      # Local-dev defaults, aligned with DATABASE_URL in .env.example.
      # Never reuse them outside localhost: override via POSTGRES_* in the
      # root .env (docker compose loads it automatically) and update
      # DATABASE_URL to match.
      POSTGRES_DB: ${POSTGRES_DB:-patrimo}
      POSTGRES_USER: ${POSTGRES_USER:-patrimo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patrimo}
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ expects the mount one level above the data directory so
      # major-version subdirs (/var/lib/postgresql/18/...) live inside the volume.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patrimo -d patrimo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    # Redis 8.6.3 — latest stable (verified 2026-05-17, source: endoflife.date/redis)
    image: redis:8.6-alpine
    container_name: patrimo-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
