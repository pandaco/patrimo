<ui-toast />

<div class="app">
  <app-sidebar (openShortcuts)="onOpenShortcuts()" />
  <div class="main">
    <app-topbar [crumbs]="crumbs()" (newTransaction)="onNewTransaction()" />
    <main id="main" tabindex="-1" [attr.aria-label]="crumbs().join(', ')">
      <router-outlet />
    </main>
  </div>
</div>

<nav class="bottom-valeurLiquidative" aria-label="Navigation principale">
  <a routerLink="/dashboard"    routerLinkActive="active" aria-label="Tableau de bord">
    <span class="ico" aria-hidden="true"><app-ico name="dashboard" /></span>
    <span>Aperçu</span>
  </a>
  <a routerLink="/portfolio"    routerLinkActive="active" aria-label="Portefeuille">
    <span class="ico" aria-hidden="true"><app-ico name="portfolio" /></span>
    <span>Portef.</span>
  </a>
  <a routerLink="/transactions" routerLinkActive="active" aria-label="Opérations">
    <span class="ico" aria-hidden="true"><app-ico name="transaction" /></span>
    <span>Transaction</span>
  </a>
  <a routerLink="/allocation"   routerLinkActive="active" aria-label="Allocation">
    <span class="ico" aria-hidden="true"><app-ico name="alloc" /></span>
    <span>Alloc.</span>
  </a>
  <a routerLink="/tools/alerts" routerLinkActive="active" aria-label="Alertes">
    <span class="ico" aria-hidden="true"><app-ico name="alert" /></span>
    <span>Alertes</span>
  </a>
</nav>

@if (keyboardShortcuts.gMode()) {
  <app-gmode-badge />
}
