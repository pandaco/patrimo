<aside class="sidebar" aria-label="Navigation principale">
  <a href="#main" class="skip-link">Aller au contenu principal</a>

  <div class="brand">
    <div class="brand-mark" aria-hidden="true">P</div>
    <div>
      <div class="brand-name">Patrimo</div>
      <div class="brand-sub">Tracker · v0.1</div>
    </div>
  </div>

  @for (group of nav; track group.label) {
    <nav class="nav-group" [attr.aria-label]="group.label">
      <div class="nav-label">{{ group.label }}</div>
      @for (item of group.items; track item.id) {
        <a
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          [attr.aria-keyshortcuts]="item.shortcut ? 'g ' + item.shortcut.toLowerCase() : null"
          [attr.title]="item.shortcut ? 'Raccourci : G puis ' + item.shortcut : null"
        >
          <span class="ico" aria-hidden="true">
            <app-ico [name]="item.icon" />
          </span>
          {{ item.label }}
          @let b = badge(item.id);
          @if (b) {
            <span class="badge" [attr.aria-label]="b + ' en attente'">{{ b }}</span>
          }
        </a>
      }
    </nav>
  }

  @if (user(); as u) {
  <div class="sidebar-footer" style="position:relative">
    <button class="user-trigger" (click)="toggleMenu($event)" aria-label="Menu utilisateur" [attr.aria-expanded]="menuOpen()">
      <div class="avatar" aria-hidden="true">{{ u.initials }}</div>
      <div class="user-meta" style="flex:1;text-align:left">
        <div class="user-name">{{ u.firstName }} {{ u.lastName }}</div>
        <div class="user-role">{{ u.riskProfile }}</div>
      </div>
      <span aria-hidden="true" style="opacity:.5;margin-left:8px">⋯</span>
    </button>

    @if (menuOpen()) {
      <div class="user-dropdown">
        <a routerLink="/settings/preferences" class="dropdown-item" (click)="menuOpen.set(false)">
          <span class="ico" aria-hidden="true"><app-ico name="settings" /></span>
          Mes préférences
        </a>
        <button class="dropdown-item" (click)="openShortcuts.emit(); menuOpen.set(false)">
          <span class="ico" aria-hidden="true"><app-ico name="calendar" /></span>
          Raccourcis clavier
        </button>
        <div class="divider"></div>
        <button class="dropdown-item" (click)="logout()">
          Déconnexion
        </button>
      </div>
    }
  </div>
  }
</aside>
